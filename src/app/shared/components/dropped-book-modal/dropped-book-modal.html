@if (book(); as book) {
  <app-modal [open]="open()" titleText="Dropped Book" accent="pink" (closed)="closed.emit()">
    <div class="dropped-book-modal__row">
      <label class="dropped-book-modal__label">Title</label>
      <ntv-input class="dropped-book-modal__control" [ngModel]="book.title" [disabledInput]="true" />
    </div>

    <div class="dropped-book-modal__row">
      <label class="dropped-book-modal__label">Author</label>
      <ntv-input class="dropped-book-modal__control" [ngModel]="book.author" [disabledInput]="true" />
    </div>

    <div class="dropped-book-modal__row">
      <label class="dropped-book-modal__label">Date Started</label>
      <input type="date" class="dropped-book-modal__date" [value]="book.dateStarted ?? ''" disabled />
    </div>

    <div class="dropped-book-modal__row">
      <label class="dropped-book-modal__label">Date Dropped</label>
      <input type="date" class="dropped-book-modal__date" [value]="book.dateDropped ?? ''" disabled />
    </div>

    <div class="dropped-book-modal__row">
      <label class="dropped-book-modal__label">Status</label>
      <app-status-badge status="dropped" />
    </div>

    <div modal-footer class="dropped-book-modal__actions">
      <ntv-button variant="primary" color="blue" rounded="full" (buttonClick)="onRestoreClick()">Restore</ntv-button>
      <ntv-button variant="outline" color="blue" rounded="full" (buttonClick)="closed.emit()">Cancel</ntv-button>
    </div>
  </app-modal>
}
